apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: airflow-importer-dag
spec:
  template:
    metadata:
      labels:
        workload: airflow-importer-dag
    spec:
      requirements:
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["m5.2xlarge"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
      taints:
        - key: workload
          value: airflow-importer-dag
          effect: NoSchedule
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: airflow-importer-dag
  limits:
    # One m5.2xlarge = 8 vCPU, so this caps the pool at a single node.
    cpu: "8"
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 2m
