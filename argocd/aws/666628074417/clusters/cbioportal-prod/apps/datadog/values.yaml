agents:
  podAnnotations:
    container.apparmor.security.beta.kubernetes.io/agent: unconfined
    container.apparmor.security.beta.kubernetes.io/process-agent: unconfined
  enabled: true
  image:
    name: agent
    tag: 7.52.0
  tolerations:
    - key: workload
      operator: Equal
      value: cbioportal
      effect: NoSchedule
    - key: workload
      operator: Equal
      value: cbio-dev
      effect: NoSchedule
    - key: workload
      operator: Equal
      value: cbio-sclc
      effect: NoSchedule
    - key: workload
      operator: Equal
      value: cbio-triage
      effect: NoSchedule
    - key: workload
      operator: Equal
      value: redis
      effect: NoSchedule
    - key: workload
      operator: Equal
      value: ingress
      effect: NoSchedule
    - key: workload
      operator: Equal
      value: keycloak
      effect: NoSchedule
    - key: workload
      operator: Equal
      value: airflow
      effect: NoSchedule
    - key: workload
      operator: Equal
      value: cbioagent
      effect: NoSchedule
    - key: workload
      operator: Equal
      value: cbioagent-db
      effect: NoSchedule
    - key: workload
      operator: Equal
      value: oncotree
      effect: NoSchedule
    - key: workload
      operator: Equal
      value: cdd
      effect: NoSchedule
    - key: workload
      operator: Equal
      value: biomni
      effect: NoSchedule
clusterAgent:
  admissionController:
    enabled: true
    mutateUnlabelled: false
    agentSidecarInjection:
      enabled: true
  podAnnotations:
    container.apparmor.security.beta.kubernetes.io/cluster-agent: unconfined
  tokenExistingSecret: datadog
  createPodDisruptionBudget: true
  enabled: true
  image:
    name: cluster-agent
    tag: 7.52.0
  replicas: 1
  confd:
    airflow.yaml: |-
      cluster_check: true
      init_config:
      instances:
        - url: http://airflow.cbioportal.aws.mskcc.org
datadog:
  logLevel: INFO
  helmCheck:
    enabled: false
    collectEvents: false
  dogstatsd:
    nonLocalTraffic: true
    useHostPort: true
