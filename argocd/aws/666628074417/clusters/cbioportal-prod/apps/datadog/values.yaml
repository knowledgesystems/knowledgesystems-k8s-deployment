agents:
  podAnnotations:
    container.apparmor.security.beta.kubernetes.io/agent: unconfined
    container.apparmor.security.beta.kubernetes.io/process-agent: unconfined
  enabled: true
  image:
    name: agent
    tag: 7.52.0
  tolerations:
    - key: workload
      operator: Equal
      value: cbioportal
      effect: NoSchedule
    - key: workload
      operator: Equal
      value: cbio-dev
      effect: NoSchedule
    - key: workload
      operator: Equal
      value: cbio-sclc
      effect: NoSchedule
    - key: workload
      operator: Equal
      value: cbio-triage
      effect: NoSchedule
    - key: workload
      operator: Equal
      value: redis
      effect: NoSchedule
    - key: workload
      operator: Equal
      value: ingress
      effect: NoSchedule
    - key: workload
      operator: Equal
      value: keycloak
      effect: NoSchedule
    - key: workload
      operator: Equal
      value: airflow
      effect: NoSchedule
    - key: workload
      operator: Equal
      value: cbioagent
      effect: NoSchedule
    - key: workload
      operator: Equal
      value: cbioagent-db
      effect: NoSchedule
    - key: workload
      operator: Equal
      value: oncotree
      effect: NoSchedule
    - key: workload
      operator: Equal
      value: cdd
      effect: NoSchedule
    - key: workload
      operator: Equal
      value: biomni
      effect: NoSchedule
clusterAgent:
  admissionController:
    enabled: true
    mutateUnlabelled: false
    agentSidecarInjection:
      enabled: true
  podAnnotations:
    container.apparmor.security.beta.kubernetes.io/cluster-agent: unconfined
  tokenExistingSecret: datadog
  createPodDisruptionBudget: true
  enabled: true
  image:
    name: cluster-agent
    tag: 7.52.0
  replicas: 1
datadog:
  logLevel: INFO
  helmCheck:
    enabled: false
    collectEvents: false
  dogstatsd:
    nonLocalTraffic: true
    useHostPort: true
    mapperProfiles: '[{"name":"airflow","prefix":"airflow.","mappings":[{"match":"airflow.*_start","name":"airflow.job.start","tags":{"job_name":"$1"}},{"match":"airflow.*_end","name":"airflow.job.end","tags":{"job_name":"$1"}},{"match":"airflow.*_heartbeat_failure","name":"airflow.job.heartbeat.failure","tags":{"job_name":"$1"}},{"match":"airflow.operator_failures_*","name":"airflow.operator_failures","tags":{"operator_name":"$1"}},{"match":"airflow.operator_successes_*","name":"airflow.operator_successes","tags":{"operator_name":"$1"}},{"match":"airflow\\.dag_processing\\.last_runtime\\.(.*)","match_type":"regex","name":"airflow.dag_processing.last_runtime","tags":{"dag_file":"$1"}},{"match":"airflow\\.dag_processing\\.last_run\\.seconds_ago\\.(.*)","match_type":"regex","name":"airflow.dag_processing.last_run.seconds_ago","tags":{"dag_file":"$1"}},{"match":"airflow\\.dag\\.loading-duration\\.(.*)","match_type":"regex","name":"airflow.dag.loading_duration","tags":{"dag_file":"$1"}},{"match":"airflow.dagrun.*.first_task_scheduling_delay","name":"airflow.dagrun.first_task_scheduling_delay","tags":{"dag_id":"$1"}},{"match":"airflow.pool.open_slots.*","name":"airflow.pool.open_slots","tags":{"pool_name":"$1"}},{"match":"airflow.pool.queued_slots.*","name":"airflow.pool.queued_slots","tags":{"pool_name":"$1"}},{"match":"airflow.pool.running_slots.*","name":"airflow.pool.running_slots","tags":{"pool_name":"$1"}},{"match":"airflow.pool.used_slots.*","name":"airflow.pool.used_slots","tags":{"pool_name":"$1"}},{"match":"airflow.pool.starving_tasks.*","name":"airflow.pool.starving_tasks","tags":{"pool_name":"$1"}},{"match":"airflow\\.dagrun\\.dependency-check\\.(.*)","match_type":"regex","name":"airflow.dagrun.dependency_check","tags":{"dag_id":"$1"}},{"match":"airflow\\.dag\\.(.*)\\.([^.]*)\\.duration","match_type":"regex","name":"airflow.dag.task.duration","tags":{"dag_id":"$1","task_id":"$2"}},{"match":"airflow\\.dag_processing\\.last_duration\\.(.*)","match_type":"regex","name":"airflow.dag_processing.last_duration","tags":{"dag_file":"$1"}},{"match":"airflow\\.dagrun\\.duration\\.success\\.(.*)","match_type":"regex","name":"airflow.dagrun.duration.success","tags":{"dag_id":"$1"}},{"match":"airflow\\.dagrun\\.duration\\.failed\\.(.*)","match_type":"regex","name":"airflow.dagrun.duration.failed","tags":{"dag_id":"$1"}},{"match":"airflow\\.dagrun\\.schedule_delay\\.(.*)","match_type":"regex","name":"airflow.dagrun.schedule_delay","tags":{"dag_id":"$1"}},{"match":"airflow.scheduler.tasks.running","name":"airflow.scheduler.tasks.running"},{"match":"airflow.scheduler.tasks.starving","name":"airflow.scheduler.tasks.starving"},{"match":"airflow.sla_email_notification_failure","name":"airflow.sla_email_notification_failure"},{"match":"airflow\\.task_removed_from_dag\\.(.*)","match_type":"regex","name":"airflow.dag.task_removed","tags":{"dag_id":"$1"}},{"match":"airflow\\.task_restored_to_dag\\.(.*)","match_type":"regex","name":"airflow.dag.task_restored","tags":{"dag_id":"$1"}},{"match":"airflow.task_instance_created-*","name":"airflow.task.instance_created","tags":{"task_class":"$1"}},{"match":"airflow\\.ti\\.start\\.(.+)\\.(\\w+)","match_type":"regex","name":"airflow.ti.start","tags":{"dag_id":"$1","task_id":"$2"}},{"match":"airflow\\.ti\\.finish\\.(\\w+)\\.(.+)\\.(\\w+)","name":"airflow.ti.finish","match_type":"regex","tags":{"dag_id":"$1","task_id":"$2","state":"$3"}}]}]'
  confd:
    airflow.yaml: |-
      cluster_check: true
      init_config:
      instances:
        - url: http://airflow.cbioportal.aws.mskcc.org
  clusterName: cbioportal-prod-6acc6d70
  apiKeyExistingSecret: datadog
  clusterChecks:
    enabled: true
  logs:
    containerCollectAll: true
    enabled: true
  apm:
    instrumentation:
      skipKPITelemetry: true
targetSystem: linux