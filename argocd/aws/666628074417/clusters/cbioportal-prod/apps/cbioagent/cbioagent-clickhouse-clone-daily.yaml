# Daily MSKIMPACT-only clone of the active MSK cBioPortal production
# color into one of two ping-pong librechat clone databases
# (cbioportal_msk_librechat_blue or _green) in ClickHouse, with LLM-prep
# SQL overrides applied. When the build target ends up different from
# the buffer the MCP is currently reading, the rollout container flips
# the clickhouse-mcp-active ConfigMap and rolls cbioagent-clickhouse-mcp.
#
# Differences from the 203 (public) variant:
#   - STUDY_FILTER=mskimpact: only mskimpact study rows are kept
#     (not msk_target_test, not any other study in the source DB).
#     Tables with cancer_study_identifier / cancer_study_id /
#     sample_id / patient_id are filtered; study-agnostic tables
#     (gene, oncotree, etc.) are copied wholesale.
#   - SQL overrides are split. Portable files (0-3: cleanup, column
#     comments, oncotree, preferences table) come from the
#     cbioportal/mcp image via the fetch-sql initContainer (same as
#     203 — no duplication of upstream SQL). MSK-private files
#     (4-msk-preferences.sql: study selections + mskimpact_gene_coverage
#     view) come from the cbioagent-clone-sql-msk ConfigMap in
#     portal-configuration via the load-msk-sql initContainer, which
#     overlays them on top of /workdir/sql.
#   - Env vars target the MSK ClickHouse cluster + management DB:
#       MGMT_DB=mskcc_update_management_database
#       PORTAL_DB_VALUE=msk
#       SRC_PREFIX=cbioportal_msk_
#       DST_PREFIX=cbioportal_msk_librechat_
#
# This bundle ships:
#   - clickhouse-mcp-active ConfigMap (CLICKHOUSE_DATABASE pointer)
#   - clickhouse-clone-job ServiceAccount + Role + RoleBinding
#   - cbioagent-clickhouse-clone-daily CronJob (4 containers: fetch-sql →
#     load-msk-sql → clone → rollout)
#
# The CronJob mounts the cbioagent-clone-job-scripts ConfigMap by name —
# its source-of-truth (clone.sh + rollout.sh) lives next to the MSK SQL
# and study guides in portal-configuration's msk-configmaps/ subdir and
# is built into the ConfigMap by Kustomize. Kept private because the
# per-table filter heuristic encodes MSK schema specifics.
#
# Companion changes:
#   - portal-configuration: clickhouse-librechat-admin Secret +
#     cbioagent-clone-sql-msk ConfigMap + cbioagent-study-guides-msk
#     ConfigMap (the latter mounted by cbioagent-clickhouse-mcp).
#   - cbioagent-clickhouse-mcp.yaml: envFrom extended to include the
#     clickhouse-mcp-active ConfigMap; volume mount added for the
#     study guides ConfigMap.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-mcp-active
  namespace: default
data:
  # Initial seed. Same caveat as 203: until the empty-string-group
  # ignoreDifferences gap is closed, Argo re-asserts this value on
  # every sync, so keep it set to whichever buffer the MCP should be
  # reading. Today (bootstrap): blue.
  CLICKHOUSE_DATABASE: cbioportal_msk_librechat_blue
---
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: clickhouse-clone-job
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: clickhouse-clone-job-role
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["clickhouse-mcp-active"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["cbioagent-clickhouse-mcp"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: clickhouse-clone-job-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: clickhouse-clone-job
    namespace: default
roleRef:
  kind: Role
  name: clickhouse-clone-job-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cbioagent-clickhouse-clone-daily
  labels:
    app.kubernetes.io/instance: cbioagent
spec:
  schedule: "0 13 * * *"  # daily 13:00 UTC = 09:00 ET (DST) / 08:00 ET (EST)
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      activeDeadlineSeconds: 7200
      template:
        spec:
          serviceAccountName: clickhouse-clone-job
          # MSK cluster only has the cbioagent workload pool labelled.
          # The cron's spike is daily and short; sharing the pool with
          # the MCP is acceptable here.
          nodeSelector:
            workload: cbioagent
          tolerations:
            - key: "workload"
              operator: "Equal"
              value: "cbioagent"
              effect: "NoSchedule"
          restartPolicy: OnFailure
          volumes:
            - name: workdir
              emptyDir: {}
            - name: scripts
              configMap:
                name: cbioagent-clone-job-scripts
                defaultMode: 0555
            - name: active-readonly
              configMap:
                name: clickhouse-mcp-active
            # MSK-private SQL overrides (lives in portal-configuration).
            # Currently just 4-msk-preferences.sql (preferences INSERTs +
            # mskimpact_gene_coverage view). The portable files 0-3 come
            # from the cbioportal/mcp image via fetch-sql instead — no
            # duplication of upstream SQL.
            - name: sql-mount
              configMap:
                name: cbioagent-clone-sql-msk
          # Four sequential containers: fetch-sql → load-msk-sql → clone → rollout.
          initContainers:
            # 1) Pull the portable LLM-prep SQL files (cleanup, column
            #    comments, oncotree enrichment, cancer_study_query_preferences
            #    table) from the cbioportal/mcp image, identical to 203's
            #    setup. imagePullPolicy: Always so each run picks up the
            #    latest upstream changes.
            - name: fetch-sql
              image: cbioportal/mcp:latest
              imagePullPolicy: Always
              command: ["sh", "-c", "cp -rv /app/sql /workdir/sql && ls /workdir/sql"]
              volumeMounts:
                - mountPath: /workdir
                  name: workdir
            # 2) Overlay the MSK-private SQL files on top. The ConfigMap
            #    currently carries only 4-msk-preferences.sql; numeric
            #    ordering ensures it applies after the 0-3 files from
            #    fetch-sql.
            - name: load-msk-sql
              image: busybox:1.36
              command: ["sh", "-c", "cp /sql-mount/*.sql /workdir/sql/ && ls /workdir/sql"]
              volumeMounts:
                - mountPath: /workdir
                  name: workdir
                - mountPath: /sql-mount
                  name: sql-mount
                  readOnly: true
            - name: clone
              image: clickhouse/clickhouse-server:26.2-alpine
              command: ["/bin/sh", "/scripts/clone.sh"]
              envFrom:
                - secretRef:
                    name: clickhouse-librechat-admin
              env:
                - name: MGMT_DB
                  value: "mskcc_update_management_database"
                - name: PORTAL_DB_VALUE
                  value: "msk"
                - name: SRC_PREFIX
                  value: "cbioportal_msk_"
                - name: DST_PREFIX
                  value: "cbioportal_msk_librechat_"
                - name: STUDY_FILTER
                  value: "mskimpact"
              volumeMounts:
                - mountPath: /workdir
                  name: workdir
                - mountPath: /scripts
                  name: scripts
                  readOnly: true
                - mountPath: /active
                  name: active-readonly
                  readOnly: true
          containers:
            - name: rollout
              image: bitnami/kubectl:latest
              command: ["/bin/sh", "/scripts/rollout.sh"]
              env:
                - name: MCP_NAMESPACE
                  value: "default"
                - name: MCP_DEPLOYMENT
                  value: "cbioagent-clickhouse-mcp"
                - name: MCP_CONFIGMAP
                  value: "clickhouse-mcp-active"
              volumeMounts:
                - mountPath: /workdir
                  name: workdir
                  readOnly: true
                - mountPath: /scripts
                  name: scripts
                  readOnly: true
