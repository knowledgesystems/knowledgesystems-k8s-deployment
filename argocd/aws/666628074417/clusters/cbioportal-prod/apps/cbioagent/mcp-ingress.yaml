# Public database MCP for the MSK account, served as a sub-path of the
# existing chat host (chat.cbioportal.aws.mskcc.org/db/mcp) to avoid the
# DNS dependency on a separate mcp.* hostname. nginx-ingress merges
# Ingresses per host, so this lives alongside cbioagent-ingress (which
# owns /) without conflict — nginx picks the longest-prefix match.
#
# This Ingress intentionally does NOT use rewrite-target. The sibling
# cbioagent-ingress rewrites everything to /, which would clobber the
# /db/mcp path. By splitting into a separate Ingress, that rewrite
# doesn't apply here. FastMCP is mounted at /db/mcp via the
# CLICKHOUSE_MCP_HTTP_PATH env var on cbioagent-clickhouse-mcp, so the
# full external path is preserved end-to-end and trailing-slash redirects
# build correct URLs.
#
# Rate-limit: 2 req/s sustained per IP, 20 concurrent connections per IP
# (mirrors the Traefik 2 rps / burst 20 cap on the 203 account).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cbioagent-db-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: http
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/limit-rps: "2"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    service.beta.kubernetes.io/aws-load-balancer-proxy-protocol: '*'
  labels:
    app.kubernetes.io/instance: cbioagent
spec:
  ingressClassName: nginx
  rules:
    - host: chat.cbioportal.aws.mskcc.org
      http:
        paths:
          - path: /db
            pathType: Prefix
            backend:
              service:
                name: cbioagent-clickhouse-mcp
                port:
                  number: 80
          # Route OAuth discovery paths to the MCP backend so they 404
          # cleanly. Without these, nginx falls through to the LibreChat
          # SPA's catch-all at `/`, which serves index.html (200 OK,
          # text/html). Claude Desktop interprets the 200 as "OAuth is
          # required here" and tries Dynamic Client Registration, which
          # fails ("Couldn't register with cBioPortal MSK DB's sign-in
          # service"). FastMCP returns 404 for any path outside /db/mcp,
          # which is the correct signal for "no OAuth required" — the
          # client then connects unauthenticated.
          #
          # 203 doesn't need this because mcp.cbioportal.org is a
          # dedicated subdomain — no LibreChat SPA collision.
          # pathType: ImplementationSpecific — nginx-ingress's admission
          # webhook rejects `pathType: Prefix` for paths containing dots
          # (treated as regex meta-characters under strict validation).
          # ImplementationSpecific delegates path matching to the
          # controller, which handles the literal `.well-known` segment
          # as a normal prefix.
          - path: /.well-known/oauth-protected-resource
            pathType: ImplementationSpecific
            backend:
              service:
                name: cbioagent-clickhouse-mcp
                port:
                  number: 80
          - path: /.well-known/oauth-authorization-server
            pathType: ImplementationSpecific
            backend:
              service:
                name: cbioagent-clickhouse-mcp
                port:
                  number: 80
