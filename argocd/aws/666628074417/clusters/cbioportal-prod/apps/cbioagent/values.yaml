replicaCount: 1
global:
  librechat:
    existingSecretName: "librechat-credentials-env"
    existingSecretApiKey: OPENAI_API_KEY
  imagePullSecrets:
    - dockerhub-creds

deploymentAnnotations:
  configmap.reloader.stakater.com/reload: "librechat-config"
  secret.reloader.stakater.com/reload: "librechat-credentials-env"

librechat:
  existingSecretName: "librechat-credentials-env"
  existingConfigYaml: "librechat-config"
  configEnv:
    DD_TRACE_PROPAGATION_STYLE: "tracecontext,datadog"
  imageVolume:
    accessModes: ReadWriteMany
    storageClassName: efs-sc

image:
  repository: cbioportal/librechat
  registry: docker.io
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "v0.8.3-rc1-custom-v9"

mongodb:
  enabled: false

librechat-rag-api:
  enabled: true
  postgresql:
    enabled: true

nodeSelector:
  workload: cbioagent

tolerations:
  - key: "workload"
    operator: "Equal"
    value: "cbioagent"
    effect: "NoSchedule"

ingress:
  enabled: false

resources:
  requests:
    memory: 2Gi
  limits:
    memory: 4Gi

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  timeoutSeconds: 1
  periodSeconds: 5
  failureThreshold: 3
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 20
  timeoutSeconds: 1
  periodSeconds: 12
  failureThreshold: 5

volumes:
  - name: aws-creds
    persistentVolumeClaim:
      claimName: aws-credentials-pvc
volumeMounts:
  - name: aws-creds
    mountPath: /home/node/.aws
    readOnly: true
