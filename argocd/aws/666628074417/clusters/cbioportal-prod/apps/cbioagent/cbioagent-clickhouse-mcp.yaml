apiVersion: apps/v1
kind: Deployment
metadata:
  name: cbioagent-clickhouse-mcp
  labels:
    run: cbioagent-clickhouse-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      run: cbioagent-clickhouse-mcp
  template:
    metadata:
      labels:
        run: cbioagent-clickhouse-mcp
    spec:
      containers:
        - name: cbioagent-clickhouse-mcp
          image: cbioportal/mcp:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            # Mount FastMCP under the external sub-path so trailing-slash
            # redirects point to https://mcp.cbioportal.aws.mskcc.org/db/mcp/
            # rather than /mcp/. Paired with the mcp-cbioportal-db-ingress
            # Ingress in this app: NO rewrite-target so the app sees the
            # full external path.
            - name: CLICKHOUSE_MCP_HTTP_PATH
              value: "/db/mcp"
          envFrom:
            - secretRef:
                name: clickhouse-mcp
      nodeSelector:
        workload: "cbioagent"
      tolerations:
        - key: "workload"
          operator: "Equal"
          value: "cbioagent"
          effect: "NoSchedule"
---
apiVersion: v1
kind: Service
metadata:
  name: cbioagent-clickhouse-mcp
spec:
  selector:
    run: cbioagent-clickhouse-mcp
  ports:
    - port: 80
      name: http
      targetPort: 8000
  type: ClusterIP
