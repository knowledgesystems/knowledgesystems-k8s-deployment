image:
  tag: "8.2.7"
  registry: "203403084713.dkr.ecr.us-east-1.amazonaws.com"
  repository: "bitnami/mongodb"
nodeSelector:
  workload: cbio-session
persistence:
  size: 200Gi
  existingClaim: cbioportal-session-service-mongodb-green
tolerations:
  - effect: NoSchedule
    key: workload
    operator: Equal
    value: cbio-session
auth:
  existingSecret: cbioportal-session-service-mongodb-creds