image:
  tag: v3.6.7
providers:
  kubernetesGateway:
    enabled: true
  kubernetesIngressNginx:
    enabled: true
    publishService:
      enabled: true
      pathOverride: "traefik/traefik"
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true

deployment:
  replicas: 2

  # Use custom fork for the user agent block plugin
  initContainers:
    - name: install-plugins
      image: alpine/git
      command:
        - sh
        - -c
        - |
          git clone --branch main --depth 1 \
          https://github.com/knowledgesystems/useragent-block-traefik.git /plugins-local/src/github.com/knowledgesystems/useragent-block-traefik
      volumeMounts:
        - name: plugins-local
          mountPath: /plugins-local
  additionalVolumes:
    - name: plugins-local
      emptyDir: {}
  additionalVolumeMounts:
    - name: plugins-local
      mountPath: /plugins-local

podDisruptionBudget:
  enabled: true
  minAvailable: 1
nodeSelector:
  workload: ingress
tolerations:
  - key: "workload"
    operator: "Equal"
    value: "ingress"
    effect: "NoSchedule"
logs:
  access:
    enabled: true
    format: json
    fields:
      general:
        defaultmode: keep
      headers:
        defaultmode: keep
        names:
          Authorization: redact
          Cookie: redact
          Set-Cookie: redact
additionalArguments:
  - "--serversTransport.forwardingTimeouts.dialTimeout=300s"
  - "--serversTransport.forwardingTimeouts.responseHeaderTimeout=300s"
  - "--serversTransport.forwardingTimeouts.idleConnTimeout=300s"
ports:
  web:
    transport:
      respondingTimeouts:
        idleTimeout: 300s
    forwardedHeaders:
      trustedIPs:
        - "10.0.0.0/20" # This should match the IPv4 CIDR from the cluster vpc
    proxyProtocol:
      trustedIPs:
        - "10.0.0.0/20" # This should match the IPv4 CIDR from the cluster vpc
  websecure:
    transport:
      respondingTimeouts:
        idleTimeout: 300s
    forwardedHeaders:
      trustedIPs:
        - "10.0.0.0/20" # This should match the IPv4 CIDR from the cluster vpc
    proxyProtocol:
      trustedIPs:
        - "10.0.0.0/20" # This should match the IPv4 CIDR from the cluster vpc
service:
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-proxy-protocol: "*"
    service.beta.kubernetes.io/aws-load-balancer-connection-idle-timeout: "300"
api:
  dashboard: true
  insecure: true
gateway:
  listeners:
    web:
      namespacePolicy:
        from: All
experimental:
  plugins:
    geoblock:
      moduleName: "github.com/PascalMinder/geoblock"
      version: "v0.3.6"
    ipblock:
      moduleName: "github.com/kvncrw/denyip"
      version: "v1.1.0"
  localPlugins:
    uablock:
      moduleName: "github.com/agence-gaya/traefik-plugin-blockuseragent"
