apiVersion: v1
kind: ConfigMap
metadata:
  name: librechat-config-beta
  namespace: default
data:
  librechat.yaml: |
    # Configuration version (required)
    version: 1.2.1

    # Cache settings: Set to true to enable caching
    cache: true

    # Allow internal k8s MCP server domains
    mcpSettings:
      allowedDomains:
        - 'cbioagent-clickhouse-mcp'
        - 'cbioportal-navigator'
        - 'cbioportal-navigator-beta'

    # Custom interface configuration
    interface:
      customWelcome: "Hey {{user.name}}! Welcome to cBioPortalChat **BETA** ⚠️ — testing new agent variants. Production is at https://chat.cbioportal.org."
      remoteAgents:
        use: true
        create: true
      mcpServers:
        placeholder: 'MCP Servers'
      privacyPolicy:
        externalUrl: 'https://librechat.ai/privacy-policy'
        openNewTab: true
      termsOfService:
        externalUrl: 'https://librechat.ai/tos'
        openNewTab: true
        modalAcceptance: true
        modalTitle: "Terms of Service for LibreChat"
        modalContent: |
          # Terms and Conditions for LibreChat

          *Effective Date: February 18, 2024*

          Welcome to LibreChat, the informational website for the open-source AI chat platform, available at https://librechat.ai. These Terms of Service ("Terms") govern your use of our website and the services we offer. By accessing or using the Website, you agree to be bound by these Terms and our Privacy Policy, accessible at https://librechat.ai//privacy.

          ## 1. Ownership

          Upon purchasing a package from LibreChat, you are granted the right to download and use the code for accessing an admin panel for LibreChat. While you own the downloaded code, you are expressly prohibited from reselling, redistributing, or otherwise transferring the code to third parties without explicit permission from LibreChat.

          ## 2. User Data

          We collect personal data, such as your name, email address, and payment information, as described in our Privacy Policy. This information is collected to provide and improve our services, process transactions, and communicate with you.

          ## 3. Non-Personal Data Collection

          The Website uses cookies to enhance user experience, analyze site usage, and facilitate certain functionalities. By using the Website, you consent to the use of cookies in accordance with our Privacy Policy.

          ## 4. Use of the Website

          You agree to use the Website only for lawful purposes and in a manner that does not infringe the rights of, restrict, or inhibit anyone else's use and enjoyment of the Website. Prohibited behavior includes harassing or causing distress or inconvenience to any person, transmitting obscene or offensive content, or disrupting the normal flow of dialogue within the Website.

          ## 5. Governing Law

          These Terms shall be governed by and construed in accordance with the laws of the United States, without giving effect to any principles of conflicts of law.

          ## 6. Changes to the Terms

          We reserve the right to modify these Terms at any time. We will notify users of any changes by email. Your continued use of the Website after such changes have been notified will constitute your consent to such changes.

          ## 7. Contact Information

          If you have any questions about these Terms, please contact us at contact@librechat.ai.

          By using the Website, you acknowledge that you have read these Terms of Service and agree to be bound by them.

      endpointsMenu: true
      modelSelect: false
      parameters: false
      sidePanel: true
      presets: false
      prompts: false
      bookmarks: false
      multiConvo: false
      agents: true
      showSwitchAgent: false
      marketplace:
        use: false
      runCode: false
      webSearch: false

    registration:
      socialLogins: ['github', 'google', 'discord', 'openid', 'facebook', 'apple', 'saml']

    actions:
      allowedDomains:
        - "swapi.dev"
        - "librechat.ai"
        - "google.com"
        - "clinicaltrials.gov"
        - "www.ebi.ac.uk"
        - "query-api.iedb.org"
        - "cedar-api.iedb.org"

    mcpServers:
      cbioportal-database:
        type: streamable-http
        url: http://cbioagent-clickhouse-mcp:80/db/mcp
      cbioportal-navigator:
        type: streamable-http
        url: http://cbioportal-navigator:80/mcp
        chatMenu: false
      cbioportal-navigator-beta:
        type: streamable-http
        url: http://cbioportal-navigator-beta:80/mcp
        chatMenu: false

    endpoints:
      agents:
        contextStrategy: 'summarize'
        recursionLimit: 50
        maxRecursionLimit: 100
        disableBuilder: false
      assistants:
        disableBuilder: true
      # BYOK custom endpoints. Paired with `*_API_KEY=user_provided`
      # entries in apps/cbioagent-beta/values.yaml. The standard
      # endpoints (anthropic / openAI / google / azureOpenAI) are
      # registered by their env vars alone and don't need a yaml block.
      # `apiKey: "user_provided"` is the hook that PR
      # cbioportal/librechat#26 keys off to surface the per-provider
      # BYOK input field under Settings → Data.
      # `models.fetch: true` pulls the live model list from each
      # provider's /models endpoint instead of pinning it here.
      custom:
        - name: "OpenRouter"
          apiKey: "user_provided"
          baseURL: "https://openrouter.ai/api/v1"
          models:
            default: ["openrouter/auto"]
            fetch: true
          titleConvo: true
          titleModel: "openai/gpt-4o-mini"
          modelDisplayLabel: "OpenRouter"
        - name: "Fireworks"
          apiKey: "user_provided"
          baseURL: "https://api.fireworks.ai/inference/v1"
          models:
            default: ["accounts/fireworks/models/llama-v3p1-70b-instruct"]
            fetch: true
          titleConvo: true
          titleModel: "accounts/fireworks/models/llama-v3p1-8b-instruct"
          modelDisplayLabel: "Fireworks"

    fileConfig:
      endpoints:
        anthropic:
          disabled: true

    balance:
      enabled: true
      startBalance: 20000000
      autoRefillEnabled: true
      refillIntervalValue: 7
      refillIntervalUnit: "days"
      refillAmount: 20000000

    # Beta model specs — unified agent only. The DB and Navigator MCP servers
    # remain configured above for the unified agent's tools.
    modelSpecs:
      enforce: false
      prioritize: true
      list:
        - name: "cBioPortalChatBeta"
          label: "cBioPortalChat - Explore cBioPortal data and links"
          default: true
          description: "Ask cBioPortalChat to explore cBioPortal data, generate cBioPortal links, and answer questions about studies, genes, mutations, clinical attributes, and patient-level results."
          placeholder: "How can I help you explore cBioPortal?"
          iconURL: "https://avatars.githubusercontent.com/u/9876251?s=48&v=4"
          showIconInHeader: true
          showIconInMenu: true
          showSwitchAgent: false
          limitBadge:
            messages: "20 msgs / 30 min"
            tokens: "20M tokens / week"
          conversationStarterCategories:
            - label: "Explore Data"
              icon: "search"
              description: "Find studies, datasets, and available molecular data in cBioPortal."
              starters:
                - "Which cBioPortal studies include lung adenocarcinoma samples with mutation and copy-number data?"
                - "Which studies have RNA expression for renal cancer?"
                - "How many studies have whole exome sequencing data?"
                - "What TCGA data do you have?"
            - label: "Navigate cBioPortal"
              icon: "map"
              description: "Create direct links to cBioPortal views, cohorts, plots, and study pages."
              starters:
                - "Give me an OncoPrint for EGFR and KRAS in TCGA lung adenocarcinoma."
                - "Can you create a cohort of metastatic prostate cancer with AR amplification?"
                - "Show me a KM plot of primary vs met prostate cancer in the MSK-IMPACT study."
            - label: "Analyze Data"
              icon: "heartbeat"
              description: "Compare genes, cancer types, molecular profiles, cohorts, and outcomes."
              starters:
                - "Show me TP53 mutation frequency across all cancer types."
                - "What are the most mutated genes in lung cancer?"
                - "Compare low grade glioma by molecular subtype."
          preset:
            endpoint: "agents"
            agent_id: "agent_OHVSJI9Gd6gwsDnFSL-Xl"
            temperature: 0
            modelLabel: "cBioPortalChat"
            greeting: |
              Ask cBioPortalChat to explore cBioPortal data, build direct cBioPortal links, and answer questions about studies, genes, mutations, clinical attributes, and patient-level results. <a href="https://docs.cbioportal.org/ai-integrations/chat-interface/" target="_blank">Learn more</a>
