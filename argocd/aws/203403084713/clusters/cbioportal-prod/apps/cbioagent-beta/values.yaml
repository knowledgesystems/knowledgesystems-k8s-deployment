# Values for the beta cBioAgent LibreChat instance at beta.chat.cbioportal.org.
# Rendered by the upstream LibreChat helm chart with releaseName: cbioagent-beta.
#
# Beta reuses all prod *backends* (MongoDB, meilisearch, rag-api if present,
# the navigator, clickhouse-mcp, and the shared images PVC). Only the
# LibreChat pod + its librechat.yaml ConfigMap are separate — beta exists to
# test new agent variants and LibreChat changes without affecting prod.
#
# Keep this file in sync with apps/cbioagent/values.yaml for anything that
# should behave the same way on both environments. The differences below are
# intentional: resource names, domain, config map name, replica count.

# Keep existing resource names (cbioagent-librechat-beta Deployment/Service)
# rather than the chart default of <release>-<chart> = cbioagent-beta-librechat.
fullnameOverride: cbioagent-librechat-beta

replicaCount: 1

deploymentAnnotations:
  secret.reloader.stakater.com/reload: "k8s-aws-creds-manager,librechat-credentials-env"
  configmap.reloader.stakater.com/reload: "librechat-config-beta"
  # Beta tracks the mutable `cbioportal/librechat:beta` tag — every push
  # to the `beta` branch on cbioportal/librechat overwrites that tag.
  # Keel polls Docker Hub and rolls this Deployment when the digest
  # behind `:beta` changes. policy=force matches any digest update;
  # trigger=poll uses the default schedule (1 min) — fast enough for
  # beta iteration without hammering the registry.
  keel.sh/policy: force
  keel.sh/trigger: poll
  keel.sh/match-tag: "true"

global:
  librechat:
    existingSecretName: "librechat-credentials-env"
    existingSecretApiKey: OPENAI_API_KEY
    # Direct env entries on the LibreChat container. These render as
    # `env:` (not `envFrom:`) so they OVERRIDE same-key entries from
    # `librechat-credentials-env` — the Secret is shared with prod, so
    # this is how we flip BYOK behavior on beta only without touching
    # the Secret. K8s precedence: direct `env:` > later `envFrom:` >
    # earlier `envFrom:`.
    #
    # `*_API_KEY=user_provided` is the signal that PR cbioportal/librechat#26
    # (Add BYOK provider key settings) looks for to enable the per-provider
    # BYOK input field under Settings → Data. Without the env override
    # users on beta would still inherit prod's static keys (or Bedrock).
    env:
      - name: ANTHROPIC_API_KEY
        value: "user_provided"
      - name: OPENAI_API_KEY
        value: "user_provided"
      - name: GOOGLE_KEY
        value: "user_provided"
      - name: AZURE_API_KEY
        value: "user_provided"
      # Replace the Secret's ENDPOINTS list (defaults to `bedrock,agents`)
      # so the four standard BYOK endpoints plus the custom block defined
      # in librechat-config-beta show up in the endpoint selector.
      - name: ENDPOINTS
        value: "bedrock,agents,anthropic,openAI,google,azureOpenAI,custom"

librechat:
  existingSecretName: "librechat-credentials-env"
  existingConfigYaml: "librechat-config-beta"
  # Non-secret env vars. Secrets (JWT_SECRET, CREDS_KEY, CREDS_IV,
  # JWT_REFRESH_SECRET, MEILI_MASTER_KEY, API keys, etc.) live in the
  # librechat-credentials-env Secret in portal-configuration and are mounted
  # via existingSecretName. Because the Deployment's envFrom lists the Secret
  # after this ConfigMap, any overlap is resolved in the Secret's favor.
  configEnv:
    PRODUCT_FEEDBACK_ENABLED: "true"
    AWS_PROFILE: "490004633549"
    DEBUG_PLUGINS: "true"
    PLUGIN_MODELS: "gpt-4,gpt-4-turbo-preview,gpt-4-0125-preview,gpt-4-1106-preview,gpt-4-0613,gpt-3.5-turbo,gpt-3.5-turbo-0125,gpt-3.5-turbo-1106,gpt-3.5-turbo-0613"
    # Point at the prod meilisearch/rag-api — beta reuses them rather than
    # standing up its own.
    MEILI_HOST: "http://cbioagent-meilisearch.default.svc.cluster.local:7700"
    RAG_API_URL: "http://cbioagent-librechat-rag-api.default.svc.cluster.local:8000"
    # Beta-specific public URL. The chart has no env: support, only envFrom,
    # so this has to go via the configenv ConfigMap.
    DOMAIN_CLIENT: "https://beta.chat.cbioportal.org"
    DOMAIN_SERVER: "https://beta.chat.cbioportal.org"
  # Disable the chart-managed image PVC so we can mount the same PVC prod uses
  # (see volumes/volumeMounts below). Keeps beta image uploads visible in prod
  # and vice versa — both instances share one MongoDB + one storage volume.
  imageVolume:
    enabled: false

image:
  repository: cbioportal/librechat
  registry: docker.io
  pullPolicy: Always
  # Beta follows the `beta` branch on cbioportal/librechat. The build
  # workflow on that repo rebuilds and overwrites this mutable tag on
  # every push, and Keel (see deploymentAnnotations above) rolls this
  # pod when the digest behind the tag changes. Prod stays pinned to
  # immutable v0.8.3-rc1-custom-vN tags so beta drift can't reach it.
  tag: "beta"

# Sub-charts: all disabled. Beta shares prod's backend services.
mongodb:
  enabled: false
meilisearch:
  enabled: false
librechat-rag-api:
  enabled: false

nodeSelector:
  workload: cbioagent

tolerations:
  - key: "workload"
    operator: "Equal"
    value: "cbioagent"
    effect: "NoSchedule"

# Ingress is defined as a raw manifest in this directory (ingress.yaml) rather
# than via the chart's ingress template, to match the prod pattern.
ingress:
  enabled: false

resources:
  # Lowered from 2Gi → 512Mi so prod + beta can co-tenant the single
  # `workload=cbioagent` node until #452 lets karpenter provision a
  # second one. Revert to 2Gi after the karpenter fix. Beta is a
  # testing instance — if it OOMs during a session, that's a
  # signal to fix #452 sooner, not to bump the request back.
  requests:
    memory: 512Mi
  limits:
    memory: 4Gi

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  timeoutSeconds: 1
  periodSeconds: 5
  failureThreshold: 3
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 20
  timeoutSeconds: 1
  periodSeconds: 12
  failureThreshold: 5

volumes:
  - name: image-volume
    persistentVolumeClaim:
      claimName: cbioagent-librechat-images
  - name: aws-creds
    secret:
      secretName: k8s-aws-creds-manager
volumeMounts:
  - name: image-volume
    mountPath: /app/client/public/images
  - name: aws-creds
    mountPath: /home/node/.aws
    readOnly: true
