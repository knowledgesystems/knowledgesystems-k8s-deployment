apiVersion: apps/v1
kind: Deployment
metadata:
  name: cbioportal-hub
  namespace: default
  labels:
    run: cbioportal-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      run: cbioportal-hub
  template:
    metadata:
      labels:
        run: cbioportal-hub
    spec:
      initContainers:
        # Extract clickhouse.sql from the cbioportal image — the running app needs
        # it on the classpath/$PORTAL_HOME for derived-table refresh after imports.
        # Same source file as the ClickHouse pod's init-extract-sql.
        - name: init-clickhouse-sql
          image: cbioportal/cbioportal:demo-bulk-load-fix
          imagePullPolicy: Always
          command: ["sh", "-c", "cp /cbioportal/db-scripts/clickhouse/clickhouse.sql /shared/clickhouse.sql"]
          volumeMounts:
            - name: clickhouse-sql
              mountPath: /shared
      containers:
        - name: cbioportal-hub
          image: cbioportal/cbioportal:demo-bulk-load-fix
          imagePullPolicy: Always
          workingDir: /cbioportal-webapp
          command: ["java"]
          args:
            - "-Xms512m"
            - "-Xmx4g"
            - "-cp"
            - "/cbioportal-webapp:/cbioportal-webapp/lib/*"
            - "org.cbioportal.PortalApplication"
            - "--authenticate=false"
            - "--sitemaps=false"
            - "--spring.datasource.url=jdbc:ch://cbioportal-hub-clickhouse:8123/cbioportal"
            - "--spring.datasource.driver-class-name=com.clickhouse.jdbc.ClickHouseDriver"
            - "--clickhouse_mode=true"
            - "--spring.profiles.active=clickhouse"
            - "--persistence.cache_type=no-cache"
            - "--db.suppress_schema_version_mismatch_errors=true"
            - "--server.port=8080"
            - "--skin.blurb=This is a development instance for previewing studies from <a href=\"https://github.com/cBioPortal/datahub\">cBioPortal/datahub</a> pull requests. Data here may be incomplete or incorrect. For production use, visit <a href=\"https://www.cbioportal.org\">www.cbioportal.org</a>."
          # Spring Boot relaxed-binding maps SPRING_DATASOURCE_USERNAME →
          # spring.datasource.username (and likewise for password), so we
          # can keep the rest of the JDBC config in args while sourcing the
          # credentials from the hub-clickhouse-creds Secret.
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: hub-clickhouse-creds
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hub-clickhouse-creds
                  key: password
          ports:
            - containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 90
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 300
            timeoutSeconds: 5
            periodSeconds: 15
            failureThreshold: 5
          volumeMounts:
            - name: clickhouse-sql
              mountPath: /cbioportal/clickhouse.sql
              subPath: clickhouse.sql
      volumes:
        - name: clickhouse-sql
          emptyDir: {}
      nodeSelector:
        workload: cbio-dev
      tolerations:
        - key: "workload"
          operator: "Equal"
          value: "cbio-dev"
          effect: "NoSchedule"
---
apiVersion: v1
kind: Service
metadata:
  name: cbioportal-hub
  namespace: default
  labels:
    run: cbioportal-hub
spec:
  ports:
    - port: 80
      name: http
      targetPort: 8080
  selector:
    run: cbioportal-hub
  type: ClusterIP
