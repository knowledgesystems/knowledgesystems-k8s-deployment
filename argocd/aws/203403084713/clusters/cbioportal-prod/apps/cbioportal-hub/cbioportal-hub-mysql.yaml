apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cbioportal-hub-mysql-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: gp2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cbioportal-hub-mysql
  namespace: default
  labels:
    app: cbioportal-hub-mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cbioportal-hub-mysql
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: cbioportal-hub-mysql
    spec:
      initContainers:
        - name: init-cgds-sql
          image: cbioportal/cbioportal:6.4.4
          command: ["sh", "-c", "cp /cbioportal/db-scripts/cgds.sql /docker-entrypoint-initdb.d/01-cgds.sql"]
          volumeMounts:
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
        - name: init-seed-sql
          image: curlimages/curl:8.5.0
          command:
            - sh
            - -c
            - |
              curl -sL https://github.com/cBioPortal/datahub/raw/master/seedDB/seed-cbioportal_hg19_hg38_v2.14.5.sql.gz \
                -o /docker-entrypoint-initdb.d/02-seed.sql.gz
          volumeMounts:
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
      containers:
        - name: mysql
          image: mysql:8.0
          command:
            - bash
            - -c
            - |
              # If DB not initialized yet, /var/lib/mysql must be empty for
              # docker-entrypoint's --initialize step. Use /tmp this boot;
              # on next restart the data dir exists and we switch to the PVC.
              # 2GB redo log (vs MySQL 8's 100MB default) so heavy bulk imports
              # don't get throttled by `Threads are unable to reserve space in
              # redo log` waits.
              MYSQL_ARGS="--local-infile=1 --innodb-redo-log-capacity=2147483648"
              if [ -d /var/lib/mysql/mysql ]; then
                mkdir -p /var/lib/mysql/tmp
                exec docker-entrypoint.sh mysqld $MYSQL_ARGS --tmpdir=/var/lib/mysql/tmp
              else
                # Uninitialized data dir: clear any leftover tmp/ so --initialize succeeds.
                rm -rf /var/lib/mysql/tmp
                exec docker-entrypoint.sh mysqld $MYSQL_ARGS --tmpdir=/tmp
              fi
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: root_password
            - name: MYSQL_DATABASE
              value: cbioportal
            - name: MYSQL_USER
              value: cbio_user
            - name: MYSQL_PASSWORD
              value: somepassword
          ports:
            - containerPort: 3306
          resources:
            requests:
              memory: 1Gi
            limits:
              memory: 2Gi
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: cbioportal-hub-mysql-pvc
        - name: initdb
          emptyDir: {}
      nodeSelector:
        workload: cbio-dev
      tolerations:
        - key: "workload"
          operator: "Equal"
          value: "cbio-dev"
          effect: "NoSchedule"
---
apiVersion: v1
kind: Service
metadata:
  name: cbioportal-hub-mysql
  namespace: default
  labels:
    app: cbioportal-hub-mysql
spec:
  ports:
    - port: 3306
      targetPort: 3306
  selector:
    app: cbioportal-hub-mysql
  type: ClusterIP
