apiVersion: v1
kind: ConfigMap
metadata:
  name: cbioportal-hub-import-config
data:
  # Mounted at /cbioportal/application.properties in importer pods; the v7
  # entrypoint shim re-packs this file into core-IMPORTER.jar so the importer
  # talks to the right DB.
  application.properties: |
    spring.datasource.url=jdbc:ch://cbioportal-hub-clickhouse:8123/cbioportal
    spring.datasource.username=cbio_user
    spring.datasource.password=somepassword
    spring.datasource.driver-class-name=com.clickhouse.jdbc.ClickHouseDriver
    clickhouse_mode=true
    spring.profiles.active=clickhouse
