apiVersion: batch/v1
kind: Job
metadata:
  name: gene-panel-seed
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: importer
          image: cbioportal/cbioportal:v7.0.0
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              apt-get update && apt-get install -y git git-lfs > /dev/null 2>&1
              git lfs install
              # v7: re-pack application.properties into core-IMPORTER.jar (per docker-compose entrypoint.sh)
              cd /tmp && cp /cbioportal/application.properties . && jar uf /core/core-IMPORTER.jar application.properties
              cd /
              # metaImport / ImportGenePanel may refresh derived tables; expose clickhouse.sql at PORTAL_HOME.
              cp /cbioportal/db-scripts/clickhouse/clickhouse.sql /cbioportal/clickhouse.sql || true
              set +e

              echo "Cloning reference_data/gene_panels from datahub master..."
              mkdir /datahub && cd /datahub
              git init -q
              # Pin LFS endpoint so we don't accidentally hit GitHub LFS quotas.
              git config --local lfs.url https://nsssw8k94d.execute-api.us-east-1.amazonaws.com/
              git remote add origin https://github.com/cBioPortal/datahub.git
              # Cone mode auto-includes .lfsconfig + .gitattributes at root
              git sparse-checkout init --cone
              git sparse-checkout set reference_data/gene_panels
              GIT_LFS_SKIP_SMUDGE=1 git fetch origin master --depth=1 -q
              GIT_LFS_SKIP_SMUDGE=1 git checkout FETCH_HEAD -q
              # Pull all reference panels via the S3 LFS endpoint.
              # --exclude='' overrides .lfsconfig fetchexclude=*.
              git lfs pull --include="reference_data/gene_panels/**" --exclude=''

              FILENAMES=$(ls reference_data/gene_panels)
              TOTAL=$(echo "$FILENAMES" | wc -l)
              INDEX=0
              FAILURES=0

              for filename in $FILENAMES; do
                INDEX=$((INDEX + 1))
                echo "[$INDEX/$TOTAL] Importing $filename..."
                java -Xmx512M -Dspring.profiles.active=clickhouse \
                  -cp /core/core-IMPORTER.jar \
                  -DPORTAL_HOME=/cbioportal \
                  org.mskcc.cbio.portal.scripts.ImportGenePanel \
                  --data "reference_data/gene_panels/$filename" --noprogress 2>&1
                if [ $? -ne 0 ]; then
                  echo "  WARNING: Failed to import $filename"
                  FAILURES=$((FAILURES + 1))
                fi
              done

              echo "========================================="
              echo "Gene panel seed complete. Failures: $FAILURES / $TOTAL"
              echo "========================================="
          env:
            - name: PORTAL_HOME
              value: /cbioportal
          resources:
            requests:
              memory: 512Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: properties
              mountPath: /cbioportal/application.properties
              subPath: application.properties
      volumes:
        - name: properties
          configMap:
            name: cbioportal-hub-import-config
      nodeSelector:
        workload: cbio-dev
      tolerations:
        - key: "workload"
          operator: "Equal"
          value: "cbio-dev"
          effect: "NoSchedule"
