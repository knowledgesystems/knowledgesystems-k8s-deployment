apiVersion: batch/v1
kind: Job
metadata:
  name: gene-panel-seed
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: importer
          image: cbioportal/cbioportal-core:demo-bulk-load-fix
          imagePullPolicy: Always
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              apt-get update && apt-get install -y git git-lfs gettext-base > /dev/null 2>&1
              git lfs install
              # cbioportal-core image: scripts at /scripts/importer, JAR at /core-*.jar,
              # application.properties at /, PORTAL_HOME=/.
              CORE_JAR=$(ls /core-*.jar | head -1)
              # envsubst fills in ${CLICKHOUSE_USER}/${CLICKHOUSE_PASSWORD}
              # from the hub-clickhouse-creds Secret.
              cd /tmp && envsubst < /application.properties > application.properties && jar uf "$CORE_JAR" application.properties
              cd /
              # Fetch clickhouse.sql from cbioportal repo (not in cbioportal-core image).
              curl -sfL https://raw.githubusercontent.com/cBioPortal/cbioportal/master/src/main/resources/db-scripts/clickhouse/clickhouse.sql -o /clickhouse.sql || true
              set +e

              echo "Cloning reference_data/gene_panels from datahub master..."
              mkdir /datahub && cd /datahub
              git init -q
              # Pin LFS endpoint so we don't accidentally hit GitHub LFS quotas.
              git config --local lfs.url https://nsssw8k94d.execute-api.us-east-1.amazonaws.com/
              git remote add origin https://github.com/cBioPortal/datahub.git
              # Cone mode auto-includes .lfsconfig + .gitattributes at root
              git sparse-checkout init --cone
              git sparse-checkout set reference_data/gene_panels
              GIT_LFS_SKIP_SMUDGE=1 git fetch origin master --depth=1 -q
              GIT_LFS_SKIP_SMUDGE=1 git checkout FETCH_HEAD -q
              # Pull all reference panels via the S3 LFS endpoint.
              # --exclude='' overrides .lfsconfig fetchexclude=*.
              git lfs pull --include="reference_data/gene_panels/**" --exclude=''

              FILENAMES=$(ls reference_data/gene_panels)
              TOTAL=$(echo "$FILENAMES" | wc -l)
              INDEX=0
              FAILURES=0

              for filename in $FILENAMES; do
                INDEX=$((INDEX + 1))
                echo "[$INDEX/$TOTAL] Importing $filename..."
                java -Xmx512M -Dspring.profiles.active=clickhouse \
                  -cp /core-*.jar \
                  -DPORTAL_HOME=/ \
                  org.mskcc.cbio.portal.scripts.ImportGenePanel \
                  --data "reference_data/gene_panels/$filename" --noprogress 2>&1
                if [ $? -ne 0 ]; then
                  echo "  WARNING: Failed to import $filename"
                  FAILURES=$((FAILURES + 1))
                fi
              done

              echo "========================================="
              echo "Gene panel seed complete. Failures: $FAILURES / $TOTAL"
              echo "========================================="
          env:
            - name: PORTAL_HOME
              value: /cbioportal
            # Consumed by envsubst (above) to fill in application.properties
            # before re-packing into core-IMPORTER.jar.
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: hub-clickhouse-creds
                  key: username
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hub-clickhouse-creds
                  key: password
          resources:
            requests:
              memory: 512Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: properties
              mountPath: /application.properties
              subPath: application.properties
      volumes:
        - name: properties
          configMap:
            name: cbioportal-hub-import-config
      nodeSelector:
        workload: cbio-dev
      tolerations:
        - key: "workload"
          operator: "Equal"
          value: "cbio-dev"
          effect: "NoSchedule"
