apiVersion: batch/v1
kind: Job
metadata:
  name: datahub-import-{{ .Values.prNumber }}-{{ .Values.headSha | trunc 7 }}
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: importer
          image: cbioportal/cbioportal:6.4.4
          command: ["/bin/bash", "-c"]
          args:
            - |
              # Install dependencies (fail fast here)
              set -e
              apt-get update && apt-get install -y git git-lfs curl jq > /dev/null 2>&1
              git lfs install
              set +e

              PR_NUMBER={{ .Values.prNumber }}
              PR_BRANCH={{ .Values.prBranch }}
              IMPORT_FAILURES=0

              # Use GitHub API to detect changed files
              echo "Fetching changed files for PR #$PR_NUMBER..."
              ALL_CHANGED_FILES=$(curl -s "https://api.github.com/repos/cBioPortal/datahub/pulls/$PR_NUMBER/files?per_page=300" \
                | jq -r '.[].filename')

              # Import any changed reference gene panels first
              CHANGED_PANELS=$(echo "$ALL_CHANGED_FILES" | grep '^reference_data/gene_panels/data_gene_panel_' || true)
              if [ -n "$CHANGED_PANELS" ]; then
                echo "Importing changed reference gene panels..."
                mkdir -p /panels
                for panel_path in $CHANGED_PANELS; do
                  filename=$(basename "$panel_path")
                  url="https://media.githubusercontent.com/media/cBioPortal/datahub/${PR_BRANCH}/${panel_path}"
                  echo "  Downloading $filename..."
                  curl -sfL "$url" -o "/panels/$filename" || continue
                  java -Xmx512M -Dspring.profiles.active=dbcp \
                    -cp /core/core-1.0.16.jar \
                    -DPORTAL_HOME=/cbioportal \
                    org.mskcc.cbio.portal.scripts.ImportGenePanel \
                    --data "/panels/$filename" --noprogress 2>&1 || true
                done
                rm -rf /panels
              fi

              CHANGED_STUDIES=$(echo "$ALL_CHANGED_FILES" \
                | grep '^public/' \
                | cut -d'/' -f1-2 \
                | sort -u)

              if [ -z "$CHANGED_STUDIES" ]; then
                echo "No changed studies detected in public/."
                exit 0
              fi

              echo "Changed studies: $CHANGED_STUDIES"

              # Resolve LFS pointers by downloading actual content via GitHub media URLs
              # (workaround for datahub repo LFS bandwidth quota limits)
              resolve_lfs_files() {
                local dir="$1"
                local branch="$2"
                find "$dir" -type f | while read -r filepath; do
                  if head -1 "$filepath" 2>/dev/null | grep -q 'version https://git-lfs.github.com/spec/v1'; then
                    local rel_path="${filepath#/datahub/}"
                    local url="https://media.githubusercontent.com/media/cBioPortal/datahub/${branch}/${rel_path}"
                    echo "  Downloading LFS file: $rel_path"
                    local tmp="${filepath}.tmp"
                    if curl -sfL "$url" -o "$tmp"; then
                      mv "$tmp" "$filepath"
                    else
                      echo "  WARNING: Failed to download $rel_path from media URL"
                      rm -f "$tmp"
                    fi
                  fi
                done
              }

              # Process studies one at a time to limit disk usage
              STUDY_COUNT=$(echo "$CHANGED_STUDIES" | wc -l)
              STUDY_INDEX=0

              for study_dir in $CHANGED_STUDIES; do
                STUDY_INDEX=$((STUDY_INDEX + 1))
                echo "========================================="
                echo "[$STUDY_INDEX/$STUDY_COUNT] Processing $study_dir..."
                echo "========================================="

                # Sparse checkout just this study
                rm -rf /datahub
                mkdir /datahub && cd /datahub
                git init -q
                git remote add origin https://github.com/cBioPortal/datahub.git
                git sparse-checkout init
                git sparse-checkout set "$study_dir"
                GIT_LFS_SKIP_SMUDGE=1 git fetch origin "$PR_BRANCH" --depth=1 -q
                if [ $? -ne 0 ]; then
                  echo "ERROR: Failed to fetch branch $PR_BRANCH"
                  IMPORT_FAILURES=$((IMPORT_FAILURES + 1))
                  continue
                fi
                GIT_LFS_SKIP_SMUDGE=1 git checkout FETCH_HEAD -q

                # Resolve LFS files for this study
                resolve_lfs_files "/datahub/$study_dir" "$PR_BRANCH"

                if [ ! -f "$study_dir/meta_study.txt" ]; then
                  echo "Skipping $study_dir (no meta_study.txt)"
                  continue
                fi

                # Import gene panel definitions (skip matrix file, that's handled by the study importer)
                for panel in $study_dir/data_gene_panel_*.txt; do
                  if [ -f "$panel" ] && [[ "$panel" != *"_matrix.txt" ]]; then
                    echo "Importing gene panel: $panel"
                    java -Xmx512M -Dspring.profiles.active=dbcp \
                      -cp /core/core-1.0.16.jar \
                      -DPORTAL_HOME=/cbioportal \
                      org.mskcc.cbio.portal.scripts.ImportGenePanel \
                      --data "$panel" --noprogress 2>&1 || true
                  fi
                done

                # Try validated import first, fall back to direct import on validation errors
                metaImport.py -u http://cbioportal-hub:80 \
                  -s /datahub/$study_dir -o 2>&1
                if [ $? -ne 0 ]; then
                  echo "Validation errors found. Attempting direct import (skipping validation)..."
                  cbioportalImporter.py import-study -s /datahub/$study_dir 2>&1
                  if [ $? -ne 0 ]; then
                    echo "WARNING: Direct import also failed for $study_dir. Continuing..."
                    IMPORT_FAILURES=$((IMPORT_FAILURES + 1))
                  else
                    echo "Successfully imported $study_dir (via direct import, skipped validation)"
                  fi
                else
                  echo "Successfully imported $study_dir"
                fi

                # Clean up to free disk before next study
                rm -rf /datahub
              done

              echo "========================================="
              echo "All imports attempted. Failures: $IMPORT_FAILURES"
              echo "========================================="
          env:
            - name: PORTAL_HOME
              value: /cbioportal
          resources:
            requests:
              memory: 1Gi
              ephemeral-storage: 1Gi
            limits:
              memory: 4Gi
              ephemeral-storage: 15Gi
          volumeMounts:
            - name: properties
              mountPath: /cbioportal/application.properties
              subPath: application.properties
      volumes:
        - name: properties
          configMap:
            name: cbioportal-hub-import-config
      nodeSelector:
        workload: cbio-dev
      tolerations:
        - key: "workload"
          operator: "Equal"
          value: "cbio-dev"
          effect: "NoSchedule"
