apiVersion: batch/v1
kind: Job
metadata:
  name: datahub-import-{{ .Values.prNumber }}-{{ .Values.headSha | trunc 7 }}
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: importer
          image: cbioportal/cbioportal:6.4.4
          command: ["/bin/bash", "-c"]
          args:
            - |
              # Install dependencies (fail fast here)
              set -e
              apt-get update && apt-get install -y git git-lfs curl jq > /dev/null 2>&1
              git lfs install
              set +e

              PR_NUMBER={{ .Values.prNumber }}
              PR_BRANCH={{ .Values.prBranch }}
              IMPORT_FAILURES=0

              # Use GitHub API to detect changed study directories
              echo "Fetching changed files for PR #$PR_NUMBER..."
              CHANGED_STUDIES=$(curl -s "https://api.github.com/repos/cBioPortal/datahub/pulls/$PR_NUMBER/files?per_page=300" \
                | jq -r '.[].filename' \
                | grep '^public/' \
                | cut -d'/' -f1-2 \
                | sort -u)

              if [ -z "$CHANGED_STUDIES" ]; then
                echo "No changed studies detected in public/."
                exit 0
              fi

              echo "Changed studies: $CHANGED_STUDIES"

              # Sparse checkout only the changed study directories (skip LFS during clone)
              mkdir /datahub && cd /datahub
              git init
              git remote add origin https://github.com/cBioPortal/datahub.git
              git sparse-checkout init
              git sparse-checkout set $CHANGED_STUDIES
              GIT_LFS_SKIP_SMUDGE=1 git fetch origin "$PR_BRANCH" --depth=1
              if [ $? -ne 0 ]; then
                echo "ERROR: Failed to fetch branch $PR_BRANCH"
                exit 1
              fi
              GIT_LFS_SKIP_SMUDGE=1 git checkout FETCH_HEAD

              # Resolve LFS pointers by downloading actual content via GitHub media URLs
              # (workaround for datahub repo LFS bandwidth quota limits)
              resolve_lfs_files() {
                local dir="$1"
                local branch="$2"
                find "$dir" -type f | while read -r filepath; do
                  if head -1 "$filepath" 2>/dev/null | grep -q 'version https://git-lfs.github.com/spec/v1'; then
                    local rel_path="${filepath#/datahub/}"
                    local url="https://media.githubusercontent.com/media/cBioPortal/datahub/${branch}/${rel_path}"
                    echo "  Downloading LFS file: $rel_path"
                    local tmp="${filepath}.tmp"
                    if curl -sfL "$url" -o "$tmp"; then
                      mv "$tmp" "$filepath"
                    else
                      echo "  WARNING: Failed to download $rel_path from media URL"
                      rm -f "$tmp"
                    fi
                  fi
                done
              }

              for study_dir in $CHANGED_STUDIES; do
                echo "Resolving LFS files for $study_dir..."
                resolve_lfs_files "/datahub/$study_dir" "$PR_BRANCH"
              done

              for study_dir in $CHANGED_STUDIES; do
                if [ -f "$study_dir/meta_study.txt" ]; then
                  echo "========================================="
                  echo "Importing $study_dir..."
                  echo "========================================="

                  # Import gene panels if present
                  for panel in $study_dir/data_gene_panel_*.txt; do
                    [ -f "$panel" ] && /core/scripts/importGenePanel.pl --data "$panel" || true
                  done

                  # Import study (overwrite existing, continue on failure)
                  metaImport.py -u http://cbioportal-hub:80 \
                    -s /datahub/$study_dir -o
                  if [ $? -ne 0 ]; then
                    echo "WARNING: Import failed for $study_dir (likely validation errors). Continuing..."
                    IMPORT_FAILURES=$((IMPORT_FAILURES + 1))
                  else
                    echo "Successfully imported $study_dir"
                  fi
                else
                  echo "Skipping $study_dir (no meta_study.txt)"
                fi
              done

              echo "========================================="
              echo "All imports attempted. Failures: $IMPORT_FAILURES"
              echo "========================================="
          env:
            - name: PORTAL_HOME
              value: /cbioportal
          resources:
            requests:
              memory: 1Gi
              ephemeral-storage: 1Gi
            limits:
              memory: 4Gi
              ephemeral-storage: 15Gi
          volumeMounts:
            - name: properties
              mountPath: /cbioportal/application.properties
              subPath: application.properties
      volumes:
        - name: properties
          configMap:
            name: cbioportal-hub-import-config
      nodeSelector:
        workload: cbio-dev
      tolerations:
        - key: "workload"
          operator: "Equal"
          value: "cbio-dev"
          effect: "NoSchedule"
