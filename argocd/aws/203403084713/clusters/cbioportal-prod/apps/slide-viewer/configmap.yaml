apiVersion: v1
kind: ConfigMap
metadata:
  name: slide-viewer-config
  namespace: default
data:
  # Dell ECS — Reef IMPACT slide bucket
  AWS_ENDPOINT_URL: "http://pmindecs.mskcc.org:9020"
  REEF_S3_BUCKET: "mskmind-bkt"
  REEF_S3_PREFIX: "reef-slides"

  # Databricks SQL warehouse
  DATABRICKS_WAREHOUSE_ID: "0b49b7d78734ad5c"

  # Redis (in-cluster sidecar)
  REDIS_URL: "redis://slide-viewer-redis:6379"

  # Cache settings
  TILE_CACHE_TTL: "0"       # 0 = no expiry (tiles are immutable)
  PATIENT_CACHE_TTL: "86400"  # 24 h

  # Tile rendering
  MAX_OPEN_SLIDES: "256"
  TILE_SIZE: "256"
  JPEG_QUALITY: "85"

  # CORS — restrict to known cBioPortal origins
  CORS_ORIGINS: "https://cbioportal.org,https://www.cbioportal.org,https://genie.cbioportal.org"
