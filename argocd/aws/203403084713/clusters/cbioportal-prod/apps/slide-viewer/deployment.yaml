apiVersion: apps/v1
kind: Deployment
metadata:
  name: slide-viewer
  namespace: default
  labels:
    app: slide-viewer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: slide-viewer
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # zero-downtime: new pod must be Ready before old is removed
  template:
    metadata:
      labels:
        app: slide-viewer
    spec:
      nodeSelector:
        workload-class: x86-general
      terminationGracePeriodSeconds: 60
      containers:
        - name: slide-viewer
          # Image tag is updated by the CI/CD pipeline (docker-publish.yml)
          image: 203403084713.dkr.ecr.us-east-1.amazonaws.com/cbioportal-slide-viewer:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: slide-viewer-config
          env:
            # Credentials from pre-existing Secret
            # Create with:
            #   kubectl create secret generic slide-viewer-secrets \
            #     --from-literal=AWS_ACCESS_KEY_ID=<key> \
            #     --from-literal=AWS_SECRET_ACCESS_KEY=<secret> \
            #     --from-literal=DATABRICKS_HOST=https://msk-mode-prod.cloud.databricks.com \
            #     --from-literal=DATABRICKS_TOKEN=<pat> \
            #     --from-literal=ANNOTATION_DATABASE_URL=postgresql://<user>:<password>@<host>:5432/cbioportal_annotations?sslmode=require
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: slide-viewer-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: slide-viewer-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: DATABRICKS_HOST
              valueFrom:
                secretKeyRef:
                  name: slide-viewer-secrets
                  key: DATABRICKS_HOST
            - name: DATABRICKS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: slide-viewer-secrets
                  key: DATABRICKS_TOKEN
            - name: ANNOTATION_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: slide-viewer-secrets
                  key: ANNOTATION_DATABASE_URL
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "8Gi"
              cpu: "4"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
