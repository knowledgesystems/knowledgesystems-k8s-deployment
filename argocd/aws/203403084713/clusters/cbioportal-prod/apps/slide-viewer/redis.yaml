apiVersion: apps/v1
kind: Deployment
metadata:
  name: slide-viewer-redis
  namespace: default
  labels:
    app: slide-viewer-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slide-viewer-redis
  template:
    metadata:
      labels:
        app: slide-viewer-redis
    spec:
      nodeSelector:
        workload-class: x86-general
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --maxmemory
            - "8gb"
            - --maxmemory-policy
            - allkeys-lru
            - --save
            - ""
            - --appendonly
            - "no"
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "2Gi"
              cpu: "100m"
            limits:
              memory: "10Gi"
              cpu: "1"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: slide-viewer-redis
  namespace: default
  labels:
    app: slide-viewer-redis
spec:
  type: ClusterIP
  selector:
    app: slide-viewer-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
