apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-server-cert
  namespace: argocd
spec:
  secretName: argocd-server-tls
  dnsNames:
    - "argocd.cbioportal.org"
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: www-cbioportal-cert
  namespace: default
spec:
  secretName: www-cbioportal-cert
  dnsNames:
    - "www.cbioportal.org"
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer