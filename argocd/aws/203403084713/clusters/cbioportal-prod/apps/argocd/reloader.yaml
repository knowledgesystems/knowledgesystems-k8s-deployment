apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: reloader
spec:
  project: default
  sources:
    - repoURL: https://github.com/knowledgesystems/knowledgesystems-k8s-deployment
      path: argocd/aws/203403084713/clusters/cbioportal-prod/apps/reloader
      targetRevision: HEAD
      directory:
        recurse: true
      ref: k8s
    - repoURL: https://stakater.github.io/stakater-charts
      targetRevision: 2.2.12
      chart: reloader
      helm:
        releaseName: reloader
        valueFiles:
          - $k8s/argocd/aws/203403084713/clusters/cbioportal-prod/apps/reloader/values.yaml
  destination:
    namespace: default
    server: https://kubernetes.default.svc
