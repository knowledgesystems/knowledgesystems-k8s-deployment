apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cbioagent
spec:
  project: default
  sources:
    - repoURL: https://github.com/knowledgesystems/knowledgesystems-k8s-deployment
      path: argocd/aws/203403084713/clusters/cbioportal-prod/apps/cbioagent
      targetRevision: HEAD
      directory:
        recurse: true
      ref: k8s-repo
    - chart: librechat
      repoURL: ghcr.io/danny-avila/librechat-chart
      targetRevision: 1.9.1
      helm:
        releaseName: cbioagent
        valueFiles:
          - $k8s-repo/argocd/aws/203403084713/clusters/cbioportal-prod/apps/cbioagent/values.yaml
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # RespectIgnoreDifferences + ServerSideApply together let the cron's
    # in-cluster patch on `clickhouse-mcp-active.data.CLICKHOUSE_DATABASE`
    # survive each sync. RespectIgnoreDifferences alone wasn't enough:
    # with the default client-side apply, Argo sends the whole resource
    # and the API server's three-way merge clobbers the ignored field
    # back to git. ServerSideApply lets Argo build the patch from
    # managed-fields and omit the ignored JSON pointer entirely.
    # Refs:
    #   https://argo-cd.readthedocs.io/en/stable/user-guide/sync-options/#respect-ignore-difference-configs
    #   https://argo-cd.readthedocs.io/en/stable/user-guide/sync-options/#server-side-apply
    syncOptions:
      - RespectIgnoreDifferences=true
      - ServerSideApply=true
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  # The cron job cbioagent-clickhouse-clone-daily owns the live value of
  # data.CLICKHOUSE_DATABASE in this ConfigMap — it patches the field on
  # every successful clone+flip. Combined with the RespectIgnoreDifferences
  # sync option above, Argo leaves the cron's patch alone instead of
  # reverting it to the seed value in cbioagent-clickhouse-clone-daily.yaml.
  ignoreDifferences:
    - group: ""
      kind: ConfigMap
      name: clickhouse-mcp-active
      namespace: default
      jsonPointers:
        - /data/CLICKHOUSE_DATABASE
