apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cbioagent
spec:
  project: default
  sources:
    - repoURL: https://github.com/knowledgesystems/knowledgesystems-k8s-deployment
      path: argocd/aws/203403084713/clusters/cbioportal-prod/apps/cbioagent
      targetRevision: HEAD
      directory:
        recurse: true
      ref: k8s-repo
    - path: helm/librechat
      repoURL: https://github.com/danny-avila/LibreChat.git
      targetRevision: v0.7.9-rc1
      helm:
        releaseName: cbioagent
        valueFiles:
          - $k8s-repo/argocd/aws/203403084713/clusters/cbioportal-prod/apps/cbioagent/values.yaml
#  syncPolicy:
#    automated:
#      prune: true
#      selfHeal: true
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  # The cron job cbioagent-clickhouse-clone-daily owns the live value of
  # data.CLICKHOUSE_DATABASE in this ConfigMap — it patches the field on
  # every successful clone+flip. Without this entry Argo CD treats the
  # cron's patch as drift and reverts it back to the seed value, which
  # silently keeps the MCP pointed at whichever DB was last in git.
  ignoreDifferences:
    - group: ""
      kind: ConfigMap
      name: clickhouse-mcp-active
      namespace: default
      jsonPointers:
        - /data/CLICKHOUSE_DATABASE
