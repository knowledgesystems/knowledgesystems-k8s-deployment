apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: genome-nexus-database
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/knowledgesystems/knowledgesystems-k8s-deployment
      path: argocd/aws/203403084713/clusters/cbioportal-prod/apps/genome-nexus-database
      targetRevision: HEAD
      directory:
        recurse: true
        include: '*.yaml'
        exclude: '*_helm_value.yaml'
    - repoURL: https://github.com/knowledgesystems/knowledgesystems-k8s-deployment
      targetRevision: HEAD
      ref: k8s-repo
  destination:
    namespace: genome-nexus
    server: https://kubernetes.default.svc
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
