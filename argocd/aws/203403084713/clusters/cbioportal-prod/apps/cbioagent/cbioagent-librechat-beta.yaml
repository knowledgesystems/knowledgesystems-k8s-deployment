apiVersion: apps/v1
kind: Deployment
metadata:
  name: cbioagent-librechat-beta
  labels:
    app.kubernetes.io/instance: cbioagent-beta
    app.kubernetes.io/name: cbioagent-librechat-beta
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: cbioagent-beta
      app.kubernetes.io/name: cbioagent-librechat-beta
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: cbioagent-beta
        app.kubernetes.io/name: cbioagent-librechat-beta
    spec:
      nodeSelector:
        workload: cbioagent
      tolerations:
        - effect: NoSchedule
          key: workload
          operator: Equal
          value: cbioagent
      securityContext:
        fsGroup: 2000
      containers:
        - name: cbioagent-librechat-beta
          image: docker.io/cbioportal/librechat:v0.8.3-rc1-custom-v7
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: cbioagent-librechat-configenv
            - secretRef:
                name: librechat-credentials-env
                optional: true
          env:
            # Override OAuth redirect URLs so users stay on beta.chat.cbioportal.org
            # after login. Requires beta callback URI registered in OAuth apps.
            - name: DOMAIN_CLIENT
              value: https://beta.chat.cbioportal.org
            - name: DOMAIN_SERVER
              value: https://beta.chat.cbioportal.org
          resources:
            requests:
              memory: 2Gi
            limits:
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 12
            timeoutSeconds: 1
            failureThreshold: 5
          securityContext:
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - name: config-yaml
              mountPath: /app/librechat.yaml
              subPath: librechat.yaml
              readOnly: true
            - name: image-volume
              mountPath: /app/client/public/images
            - name: aws-creds
              mountPath: /home/node/.aws
              readOnly: true
      volumes:
        - name: config-yaml
          configMap:
            name: librechat-config-beta
            defaultMode: 420
        - name: image-volume
          persistentVolumeClaim:
            claimName: cbioagent-librechat-images
        - name: aws-creds
          persistentVolumeClaim:
            claimName: aws-credentials-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: cbioagent-librechat-beta
  labels:
    app.kubernetes.io/instance: cbioagent-beta
    app.kubernetes.io/name: cbioagent-librechat-beta
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: cbioagent-beta
    app.kubernetes.io/name: cbioagent-librechat-beta
  ports:
    - name: http
      port: 3080
      targetPort: http
      protocol: TCP
