apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-navigator-prefix
  namespace: default
spec:
  stripPrefix:
    prefixes:
      - /navigator
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcp-cbioportal-ingress
  annotations:
    acme.cert-manager.io/http01-ingress-class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/ingress.class: traefik
    kubernetes.io/tls-acme: "true"
    traefik.ingress.kubernetes.io/router.middlewares: default-strip-navigator-prefix@kubernetescrd
  labels:
    app.kubernetes.io/instance: cbioagent
spec:
  rules:
    - host: mcp.cbioportal.org
      http:
        paths:
          - path: /navigator
            pathType: Prefix
            backend:
              service:
                name: cbioportal-navigator
                port:
                  number: 80
  tls:
    - hosts:
        - mcp.cbioportal.org
      secretName: mcp-cbio-cert
