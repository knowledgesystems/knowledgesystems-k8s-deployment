apiVersion: apps/v1
kind: Deployment
metadata:
  name: cbioportal-navigator
  labels:
    run: cbioportal-navigator
  annotations:
    # Keel polls ghcr for `:latest` and rolls this Deployment when the
    # digest changes. Without this, `imagePullPolicy: Always` only pulls
    # a new image on pod restart — a master push doesn't roll the pod on
    # its own, so fixes can sit unshipped until something else evicts it.
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/match-tag: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      run: cbioportal-navigator
  template:
    metadata:
      labels:
        run: cbioportal-navigator
    spec:
      containers:
        - name: cbioportal-navigator
          image: ghcr.io/cbioportal/cbioportal-navigator:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
          envFrom:
            - secretRef:
                name: cbioportal-navigator-env
                optional: true
          env:
            - name: CBIOPORTAL_BASE_URL
              value: https://www.cbioportal.org
            - name: NODE_ENV
              value: production
      nodeSelector:
        workload: "cbioagent"
      tolerations:
        - key: "workload"
          operator: "Equal"
          value: "cbioagent"
          effect: "NoSchedule"
---
apiVersion: v1
kind: Service
metadata:
  name: cbioportal-navigator
spec:
  selector:
    run: cbioportal-navigator
  ports:
    - port: 80
      name: http
      targetPort: 8002
  type: ClusterIP
