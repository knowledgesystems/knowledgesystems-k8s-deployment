apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    run: oncokb-core-curation-beta
    tags.datadoghq.com/env: eks-beta-oncokb
    tags.datadoghq.com/service: oncokb-core-curation
  name: oncokb-core-curation-beta
spec:
  replicas: 1
  selector:
    matchLabels:
      run: oncokb-core-curation-beta
  strategy:
    rollingUpdate:
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        run: oncokb-core-curation-beta
        tags.datadoghq.com/env: eks-beta-oncokb
        tags.datadoghq.com/service: oncokb-core-curation
        admission.datadoghq.com/enabled: "true"
      annotations:
        admission.datadoghq.com/java-lib.version: v1.24.2
    spec:
      volumes:
        - name: log4j-properties
          configMap:
            name: oncokb-core-log4j-properties
      containers:
        - name: oncokb-core-curation-beta
          image: mskcc/oncokb:6.3-range-beta-3
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: oncokb-core-curation-beta
            - secretRef:
                name: redis-cluster
            - secretRef:
                name: oncokb-db-public-rds-oncokb-user
          volumeMounts:
            - mountPath: /config/
              name: log4j-properties
          command: ["java"]
          args:
            - "-Xms500m"
            - "-XX:+UseSerialGC"
            - "-XX:MinHeapFreeRatio=20"
            - "-XX:MaxHeapFreeRatio=40"
            - "-XX:GCTimeRatio=4"
            - "-XX:AdaptiveSizePolicyWeight=90"
            - "-XX:+UnlockExperimentalVMOptions"
            - "-XX:+UseCGroupMemoryLimitForHeap"
            - "-XX:MaxRAMFraction=2"
            - "-XX:+PrintFlagsFinal"
            - "-XshowSettings:vm"
            - "-XX:MaxRAM=4g"
            - "-Dapp.name=$(APP_NAME)"
            - "-Djdbc.driverClassName=com.mysql.jdbc.Driver"
            - "-Djdbc.url=$(DB_URL)/oncokb_core_curation_beta?useUnicode=yes&characterEncoding=UTF-8&useSSL=false"
            - "-Djdbc.username=$(DB_USERNAME)"
            - "-Djdbc.password=$(DB_PASSWORD)"
            - "-Dgenomenexus.api=https://www.genomenexus.org/"
            - "-Doncokb_transcript.url=https://transcript.oncokb.org"
            - "-Doncokb_transcript.token=$(ONCOKB_TRANSCRIPT_TOKEN)"
            - "-Dpublic_oncokb.token=$(PUBLIC_ONCOKB_TOKEN)"
            - "-Dredis.enable=false"
            - "-Dredis.type=$(REDIS_TYPE)"
            - "-Dredis.address=$(REDIS_ADDRESS)"
            - "-Dredis.password=$(REDIS_PASSWORD)"
            - "-Dredis.expiration=$(REDIS_EXPIRATION)"
            - "-Dswagger_url=https://beta.oncokb.org"
            - "-Dshow_sitemaps=false"
            - "-Dsentry.stacktrace.app.packages=org.mskcc.cbio.oncokb"
            - "-Dsentry.sample.rate=1"
            - "-Dlog4j.configuration=file:/config/log4j.properties"
            - "-jar"
            - "/webapp-runner.jar"
            - "--enable-compression"
            - "--port"
            - "8888"
            - "/app.war"
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8888
            initialDelaySeconds: 15
            timeoutSeconds: 10
            periodSeconds: 20
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8888
            initialDelaySeconds: 300
            timeoutSeconds: 5
            periodSeconds: 20
            failureThreshold: 60
          ports:
            - containerPort: 8888
              protocol: TCP
          resources:
            requests:
              cpu: 300m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 2Gi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      tolerations:
        - key: workload
          operator: Equal
          value: beta
          effect: NoSchedule
      nodeSelector:
        workload: beta
---
apiVersion: v1
kind: Service
metadata:
  labels:
    run: oncokb-core-curation-beta
  name: oncokb-core-curation-beta
spec:
  ports:
    - port: 8888
  selector:
    run: oncokb-core-curation-beta
  type: ClusterIP
