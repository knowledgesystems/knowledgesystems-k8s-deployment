apiVersion: batch/v1
kind: Job
metadata:
  name: oncokb-regression-test
spec:
  ttlSecondsAfterFinished: 86400 # Look into this
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never      
      volumes:
        - name: shared-data
          emptyDir: {}
      initContainers:
        - name: fetch-test-data
          image: curlimages/curl:latest
          envFrom:
            - secretRef:
                name: oncokb-test-github-token
          command: ["/bin/sh", "-c"]
          args:
            - |
              curl -fsSL \
                -H "Authorization: token ${ONCOKB_TEST_GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github.v3.raw" \
                -H "Accept-Encoding: identity" \
                -o /shared/mutations.txt.gz \
                "https://api.github.com/repos/oncokb/oncokb-test/contents/mutations.txt.gz"
          volumeMounts:
            - name: shared-data
              mountPath: /shared
      containers:
        - name: run-regression-test
          image: mskcc/oncokb-test:latest
          imagePullPolicy: Always
          env:
            - name: ONCOKB_BASE_URL
              value: http://oncokb-core-curation:8888
          volumeMounts:
            - name: shared-data
              mountPath: /mutations.txt.gz
              subPath: mutations.txt.gz
      nodeSelector:
        workload: beta
      tolerations:
        - key: "workload"
          operator: "Equal"
          value: "beta"
          effect: "NoSchedule"
