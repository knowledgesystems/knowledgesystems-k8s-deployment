apiVersion: v1
kind: ServiceAccount
metadata:
  name: oncokb-staging-restart-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: oncokb-staging-restart-role
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["oncokb-core-curation-beta", "oncokb-core-curation"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: oncokb-staging-restart-rb
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: oncokb-staging-restart-role
subjects:
  - kind: ServiceAccount
    name: oncokb-staging-restart-sa
