apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: oncokb-public
    version: "v1"
    tags.datadoghq.com/service: oncokb-public
  name: oncokb-public
spec:
  replicas: 5
  selector:
    matchLabels:
      app: oncokb-public
      version: "v1"
  strategy:
    rollingUpdate:
      maxSurge: 5
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: oncokb-public
        version: "v1"
        tags.datadoghq.com/service: oncokb-public
        admission.datadoghq.com/enabled: "true"
      annotations:
        admission.datadoghq.com/java-lib.version: v1.24.2
    spec:
      containers:
        - name: oncokb-public
          image: mskcc/oncokb-public:6.3.0
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod,no-liquibase
            - name: JAVA_OPTS
              value: "-Xmx1024m -Xms512m"
            - name: APPLICATION_API_PROXY_GERMLINE_URL
              value: "http://oncokb-core:8888"
            - name: APPLICATION_SAMLAWS_SERVICEACCOUNTUSERNAME
              value: "$(SERVICE_ACCOUNT_USERNAME)"
            - name: APPLICATION_SAMLAWS_SERVICEACCOUNTPASSWORD
              value: "$(SERVICE_ACCOUNT_PASSWORD)"
            - name: APPLICATION_SAMLAWS_PRINCIPALARN
              value: "$(PRINCIPAL_ARN)"
            - name: APPLICATION_SAMLAWS_ROLEARN
              value: "$(ROLE_ARN)"
            - name: APPLICATION_GITHUB_TOKEN
              value: "$(ONCOKBDEV_PUBLIC_ACCESS_TOKEN)"
            - name: APPLICATION_GITHUB_SEARCH_SLEEP_MS
              value: "10000"
            - name: APPLICATION_DB_READ_ONLY
              value: "true"
            - name: APPLICATION_REDIS_TYPE
              value: "$(REDIS_TYPE)"
            - name: APPLICATION_REDIS_ADDRESS
              value: "$(REDIS_ADDRESS)"
            - name: APPLICATION_REDIS_PASSWORD
              value: "$(REDIS_PASSWROD)"
            - name: APPLICATION_REDIS_EXPIRATION
              value: "$(REDIS_EXPIRATION)"
            - name: APPLICATION_REDIS_ENABLED
              value: "true"
            - name: SENTRY_EXCEPTION_RESOLVER_ORDER
              value: "-2147483647"
            - name: SENTRY_TRACES_SAMPLE_RATE
              value: ".2"
            - name: SPRING_DATASOURCE_URL
              value: "${DB_URL}/oncokb_public"
            - name: SPRING_DATASOURCE_USERNAME
              value: "${DB_USERNAME}"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "${DB_PASSWORD}"
            - name: LOGGING_LEVEL_ROOT
              value: "INFO"
            - name: LOGGING_PATTERN_CONSOLE
              value: "%d{yyyy-MM-dd HH:mm:ss} %-5p [%X{requestId}]  %C:%L - %X{dd.trace_id} %X{dd.span_id} - %m%n"
            - name: APPLICATION_RATE_LIMIT_CAPACITY
              value: "7"
            - name: APPLICATION_RATE_LIMIT_REFILL_PERIOD
              value: "1s"
          envFrom:
            - secretRef:
                name: oncokb-public
            - secretRef:
                name: oncokb-research-sa
            - secretRef:
                name: oncokb-github
            - secretRef:
                name: redis-cluster
            - secretRef:
                name: oncokb-db-public-rds-oncokb-public
          readinessProbe:
            httpGet:
              path: /
              port: 9095
            initialDelaySeconds: 30
            timeoutSeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 9095
            initialDelaySeconds: 90
            timeoutSeconds: 15
            periodSeconds: 15
            failureThreshold: 10
          resources:
            requests:
              memory: 1Gi
              cpu: 500m
            limits:
              memory: 2Gi
              cpu: 2000m
          ports:
            - name: http
              containerPort: 9095
          volumeMounts:
            - mountPath: /app/resources/config/recaptcha/oncokb-recaptcha-credentials.json
              subPath: oncokb-recaptcha-credentials.json
              name: recaptcha-credentials
      tolerations:
        - key: workload
          operator: Equal
          value: main
          effect: NoSchedule
      nodeSelector:
        workload: main
      volumes:
        - name: recaptcha-credentials
          secret:
            secretName: oncokb-recaptcha-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: oncokb-public
  labels:
    app: oncokb-public
spec:
  selector:
    app: oncokb-public
  type: ClusterIP
  ports:
    - name: http
      port: 9095
