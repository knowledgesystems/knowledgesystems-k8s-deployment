# Standalone Redis for oncokb-public Spring Session, pinned to the "main" workload nodes.
global:
  security:
    allowInsecureImages: true
  imagePullSecrets:
    - oncokb-dockerhub-creds

image:
  registry: docker.io
  repository: bitnamilegacy/redis

architecture: replication

auth:
  enabled: true
  existingSecret: redis-cluster
  existingSecretPasswordKey: REDIS_PASSWORD

master:
  # Required for Spring Session (Redisson): emit keyevent expired/del notifications so Redisson's listener
  # deletes the (TTL-less) session map and prunes the spring:session:index:...PRINCIPAL... set when a
  # session expires. Without this, expired sessions and their index entries leak permanently.
  extraFlags:
    - "--notify-keyspace-events Egx"
  persistence:
    enabled: true
    storageClass: gp2
    accessModes:
      - ReadWriteOnce
    size: 1Gi
  nodeSelector:
    workload: main
  tolerations:
    - key: workload
      value: main
      operator: Equal
      effect: NoSchedule

replica:
  # See master.extraFlags above; replicas must emit the same keyevent notifications since Spring Session
  # reads/cleanup can run against any node serving the data.
  extraFlags:
    - "--notify-keyspace-events Egx"
  persistence:
    enabled: true
    storageClass: gp2
    accessModes:
      - ReadWriteOnce
    size: 1Gi
  nodeSelector:
    workload: main
  tolerations:
    - key: workload
      value: main
      operator: Equal
      effect: NoSchedule
