# Standalone Redis for oncokb-public Spring Session, pinned to the "main" workload nodes.
global:
  security:
    allowInsecureImages: true
  imagePullSecrets:
    - oncokb-dockerhub-creds

image:
  registry: docker.io
  repository: bitnamilegacy/redis

architecture: replication

auth:
  enabled: true
  existingSecret: redis-cluster
  existingSecretPasswordKey: REDIS_PASSWORD

master:
  persistence:
    enabled: true
    storageClass: gp2
    accessModes:
      - ReadWriteOnce
    size: 1Gi
  nodeSelector:
    workload: main
  tolerations:
    - key: workload
      value: main
      operator: Equal
      effect: NoSchedule

replica:
  persistence:
    enabled: true
    storageClass: gp2
    accessModes:
      - ReadWriteOnce
    size: 1Gi
  nodeSelector:
    workload: main
  tolerations:
    - key: workload
      value: main
      operator: Equal
      effect: NoSchedule
